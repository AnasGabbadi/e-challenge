# ==========================================
# PostgreSQL existant (au lieu de Testcontainers)
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/echallenge_test
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA/Hibernate Configuration
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ==========================================
# JWT Configuration
# ==========================================
jwt.secret=testSecretKeyForE-ChallengeTestingPurposesOnlyDoNotUseInProduction1234567890
jwt.expiration=3600000

# ==========================================
# Email Configuration (Disabled for tests)
# ==========================================
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ==========================================
# Logging
# ==========================================
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.ma.project.echallenge=DEBUG