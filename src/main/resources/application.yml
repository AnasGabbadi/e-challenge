spring:
  application:
    name: e-challenge-api

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/echallenge_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

jwt:
  secret: a0543f6a49b0d38ea8e25168afef75ec2ed3c6e7beddf9dda3e5fa555c4c87c8
  expiration: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: alpha
    tags-sorter: alpha

logging:
  level:
    ma.project.echallenge: DEBUG
    org.springframework.security: DEBUG
